<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark ocean background -->
  <rect width="32" height="32" rx="5" fill="#0e3a5c"/>

  <!-- Fishing rod (brown, diagonal from lower-left to upper-right) -->
  <line x1="4" y1="28" x2="21" y2="5" stroke="#d4956a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Reel on rod -->
  <circle cx="8" cy="24" r="2.2" fill="none" stroke="#aaaaaa" stroke-width="1"/>

  <!-- Fishing line from tip, curving down to the fish -->
  <path d="M21 5 Q29 10 27 22" stroke="#cccccc" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Fish body -->
  <ellipse cx="24" cy="25" rx="4.5" ry="2.5" fill="#48b5d9"/>

  <!-- Fish tail -->
  <polygon points="28.3,23 31.5,20.5 31.5,27.5" fill="#48b5d9"/>

  <!-- Fish eye -->
  <circle cx="21" cy="24.2" r="1" fill="white"/>
  <circle cx="21.2" cy="24.2" r="0.5" fill="#1a1a2e"/>

  <!-- Water shimmer line -->
  <path d="M2 30 Q8 28.5 14 30 Q20 31.5 26 30 Q29 29.2 31 30"
        stroke="#1a6fa0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
